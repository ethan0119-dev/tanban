services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: tanban-api:local
    container_name: tanban-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - ../../.env.production
    environment:
      TZ: Asia/Shanghai
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    pids_limit: 256
    cpus: 2.0
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://127.0.0.1:18090/readyz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
