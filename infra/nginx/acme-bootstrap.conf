# Temporary first-deploy HTTP configuration. Remove after the three TLS
# certificates exist and the production vhosts have been installed.
server {
    listen 80;
    server_name tbapi.666qwe.cn;
    root /www/wwwroot/tanban-api-acme;
    location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
    location / { return 200 "tanban api certificate bootstrap\n"; }
}

