server {
    listen 80;
    server_name tbapi.666qwe.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/tanban-api-acme;
    }

    location = /YYMFacfbfJ.txt {
        root /www/wwwroot/tanban-api-acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name tbapi.666qwe.cn;

    access_log /www/wwwlogs/tbapi.666qwe.cn.access.log;
    error_log  /www/wwwlogs/tbapi.666qwe.cn.error.log;

    ssl_certificate     /etc/letsencrypt/live/tbapi.666qwe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tbapi.666qwe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /YYMFacfbfJ.txt {
        root /www/wwwroot/tanban-api-acme;
        default_type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:18090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
