server {
    listen 80;
    server_name mysales.666qwe.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/tanban-merchant;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mysales.666qwe.cn;

    access_log /www/wwwlogs/mysales.666qwe.cn.access.log;
    error_log  /www/wwwlogs/mysales.666qwe.cn.error.log;

    ssl_certificate     /etc/letsencrypt/live/mysales.666qwe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mysales.666qwe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /www/wwwroot/tanban-merchant;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://tbapi.666qwe.cn wss://tbapi.666qwe.cn; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://tbapi.666qwe.cn wss://tbapi.666qwe.cn; form-action 'self'" always;
        try_files $uri =404;
    }
}
